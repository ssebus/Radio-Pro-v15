<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Tagi SEO dla Google Search Console -->
    <title>Radio Pro v15 - Darmowe Radio Internetowe Bez Reklam</title>
    <meta name="description" content="Słuchaj ulubionych stacji radiowych online za darmo i bez reklam. Dodawaj stacje do ulubionych w aplikacji Radio Pro v15.">
    
    <!-- Link do Twoich ikon (np. FontAwesome jeśli używasz do gwiazdek) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Link do Twojego pliku ze stylem CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        
        <!-- Główny odtwarzacz (Player) -->
        <div class="player-section">
            <div class="radio-icon-box">
                <!-- Ikona radia z Twojego pięknego designu -->
                <i class="fa-solid fa-radio main-radio-icon"></i>
            </div>
            
            <h1 id="current-status" class="status-title">Ready to play</h1>
            
            <button id="play-btn" class="play-button">
                <i class="fa-solid fa-play"></i>
            </button>
            
            <!-- Suwak głośności -->
            <div class="volume-container">
                <i class="fa-solid fa-volume-low"></i>
                <input type="range" id="volume-slider" min="0" max="100" value="50" class="volume-slider">
                <i class="fa-solid fa-volume-high"></i>
            </div>
        </div>

        <hr class="divider">

        <!-- Wyszukiwarka stacji -->
        <div class="search-section">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Search...">
                <button id="search-btn" class="search-ok-button">OK</button>
            </div>
        </div>

        <!-- Sekcja Ulubionych stacji (Zapisywanych w pamięci przeglądarki) -->
        <div class="favorites-section">
            <h2 class="section-title class-blue">MY FAVORITES <i class="fa-solid fa-star"></i></h2>
            <div id="favorites-list" class="stations-list">
                <!-- Tutaj Twój kod JavaScript automatycznie wstrzykuje ulubione stacje -->
            </div>
        </div>

        <!-- Sekcja Wszystkich Wyników / Stacji -->
        <div class="results-section">
            <h2 class="section-title class-blue">RESULTS</h2>
            <div id="results-list" class="stations-list">
                <!-- Tutaj wyświetlają się kafelki z logotypami (np. RMF FM, Eska, Big FM) -->
            </div>
        </div>

    </div>

    <!-- Link do Twojego pliku z logiką JavaScript -->
    <script src="script.js"></script>
</body>
</html>
