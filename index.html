<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Radio Pro v15</title>

    <!-- Mały detal dla iPhone'a - teraz ikona 📻 zadziała też na Apple! -->
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📻</text></svg>">

    <!-- Konfiguracja PWA dla Androida i Google -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">

    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #ffffff;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Pulpit systemu GeminiOS */
        .desktop {
            flex: 1;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
            grid-template-rows: repeat(auto-fill, minmax(95px, 1fr));
            gap: 15px;
            align-content: start;
            justify-items: center;
        }

        .desktop-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 90px;
            cursor: pointer;
            border-radius: 10px;
            transition: background 0.2s;
            text-align: center;
        }

        .desktop-icon:active, .desktop-icon:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .desktop-icon .app-img {
            font-size: 3rem;
            margin-bottom: 5px;
            filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.3));
        }

        .desktop-icon .app-name {
            font-size: 0.8rem;
            font-weight: 500;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }

        /* Styl okien aplikacji */
        .window {
            position: absolute;
            top: 10%;
            left: 5%;
            width: 90%;
            height: 75%;
            background: rgba(30, 30, 50, 0.95);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            z-index: 10;
            transform: scale(0.95);
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.1, 0.9, 0.2, 1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .window.open {
            transform: scale(1);
            opacity: 1;
            pointer-events: auto;
        }

        .window-header {
            padding: 12px 16px;
            background: rgba(20, 20, 35, 0.8);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top-left-radius: 16px;
            border-top-right-radius: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .window-title {
            font-weight: 600;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .close-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(255, 95, 87, 0.2);
            color: #ff5f57;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.8rem;
            transition: background 0.2s;
        }

        .close-btn:active {
            background: rgba(255, 95, 87, 0.5);
        }

        .window-content {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        /* Wnętrze aplikacji Radio Pro */
        .radio-container {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .radio-controls {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            align-items: center;
            background: rgba(255,255,255,0.05);
            padding: 12px;
            border-radius: 12px;
        }

        .control-button {
            background: #e94560;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .control-button:active {
            background: #ff6b81;
        }

        .vol-box {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
        }

        .vol-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(255,255,255,0.2);
            outline: none;
        }

        .vol-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #e94560;
            cursor: pointer;
        }

        .radio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 12px;
            flex: 1;
        }

        .station-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 14px 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .station-card:animated, .station-card:active {
            background: rgba(255,255,255,0.15);
            transform: scale(0.95);
        }

        .station-card.playing {
            border: 2px solid #e94560;
            background: rgba(233, 69, 96, 0.15);
            box-shadow: 0 0 15px rgba(233, 69, 96, 0.4);
        }

        .station-icon {
            font-size: 2.2rem;
        }

        .station-name {
            font-size: 0.85rem;
            font-weight: 600;
        }

        /* Dolny pasek zadań (Taskbar) */
        .taskbar {
            height: 55px;
            background: rgba(15, 15, 25, 0.75);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            z-index: 100;
        }

        .taskbar-center {
            display: flex;
            gap: 10px;
        }

        .taskbar-icon {
            width: 42px;
            height: 42px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.02);
        }

        .taskbar-icon.active-app {
            border-bottom: 3px solid #e94560;
            background: rgba(255,255,255,0.1);
        }

        .taskbar-right {
            font-size: 0.85rem;
            font-weight: 600;
            background: rgba(255,255,255,0.05);
            padding: 6px 12px;
            border-radius: 15px;
            letter-spacing: 0.5px;
        }

        /* Sekcja SEO ukryta przed użytkownikiem */
        .seo-keywords {
            display: none;
            visibility: hidden;
            width: 0;
            height: 0;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <!-- Pulpit z ikonami -->
    <div class="desktop">
        <div class="desktop-icon" onclick="toggleApp('radio-window')">
            <span class="app-img">📻</span>
            <span class="app-name">Radio Pro</span>
        </div>
    </div>

    <!-- Okno aplikacji Radio Pro v15 -->
    <div id="radio-window" class="window">
        <div class="window-header">
            <div class="window-title">📻 Radio Pro v15</div>
            <button class="close-btn" onclick="toggleApp('radio-window')">✕</button>
        </div>
        <div class="window-content">
            <div class="radio-container">
                <div class="radio-controls">
                    <button class="control-button" id="stop-btn">🛑 STOP</button>
                    <div class="vol-box">
                        <span>🔊</span>
                        <input type="range" class="vol-slider" id="volume" min="0" max="1" step="0.01" value="0.5">
                    </div>
                </div>
                <div class="radio-grid" id="stations-grid"></div>
            </div>
        </div>
    </div>

    <!-- Ukryty odtwarzacz audio -->
    <audio id="audio-player" preload="none"></audio>

    <!-- Dolny pasek zadań systemu GeminiOS -->
    <div class="taskbar">
        <div style="width: 40px;"></div> <!-- Wyważenie paska -->
        <div class="taskbar-center">
            <div class="taskbar-icon active-app" onclick="toggleApp('radio-window')">📻</div>
        </div>
        <div class="taskbar-right" id="live-clock">00:00</div>
    </div>

    <!-- Sekcja słów kluczowych i literówek dla wyszukiwarki Google -->
    <div class="seo-keywords">
        radio pro v15, radio prov15, radio pro, radio15, radioprov, radjo pro 15, radjo pro v15, radjopro, polskie radio, internetowe radio, stacje radiowe, radio na telefon, rmf fm, eska, vox fm, rpr1, swr3, bigfm, radio online, darmowe radio, pwa radio app.
    </div>

    <script>
        // Lista stacji radiowych
        const stations = [
            { name: "RMF FM", url: "https://r.orastream.srv.fluidstream.eu/RMF-FM.mp3", icon: "🎵" },
            { name: "Radio Zet", url: "https://r.orastream.srv.fluidstream.eu/Radio-Zet.mp3", icon: "🔴" },
            { name: "Eska", url: "https://waw01-01.ic.smcdn.pl/2120-1.mp3", icon: "🔥" },
            { name: "Vox FM", url: "https://waw01-01.ic.smcdn.pl/2330-1.mp3", icon: "🕺" },
            { name: "RMF MAXX", url: "https://r.orastream.srv.fluidstream.eu/RMF-MAXX.mp3", icon: "⚡" },
            { name: "Złote Przeboje", url: "https://mainstream.radioagora.pl/tuba9-1.mp3", icon: "📀" },
            { name: "SWR3", url: "https://swr-swr3-live.cast.addradio.de/swr/swr3/live/mp3/128/stream.mp3", icon: "🇩🇪" },
            { name: "RPR1", url: "https://rpr1.streamabc.zone/rpr1-sub01-mp3-128-4444901", icon: "🍇" },
            { name: "bigFM", url: "https://bigfm.streamabc.zone/bigfm-mp3-128-3605670", icon: "🔊" }
        ];

        const stationsGrid = document.getElementById('stations-grid');
        const audioPlayer = document.getElementById('audio-player');
        const stopBtn = document.getElementById('stop-btn');
        const volumeSlider = document.getElementById('volume');
        let playingCard = null;

        // Budowanie kafelków wewnątrz aplikacji radiowej
        stations.forEach(station => {
            const card = document.createElement('div');
            card.className = 'station-card';
            card.innerHTML = `<span class="station-icon">${station.icon}</span><span class="station-name">${station.name}</span>`;
            
            card.addEventListener('click', () => {
                if (playingCard === card) {
                    if (!audioPlayer.paused) {
                        audioPlayer.pause();
                        card.classList.remove('playing');
                    } else {
                        audioPlayer.play().catch(err => console.log(err));
                        card.classList.add('playing');
                    }
                    return;
                }

                if (playingCard) playingCard.classList.remove('playing');
                
                audioPlayer.src = station.url;
                audioPlayer.play()
                    .then(() => {
                        card.classList.add('playing');
                        playingCard = card;
                    })
                    .catch(err => {
                        alert("Strumień stacji jest chwilowo niedostępny.");
                    });
            });

            stationsGrid.appendChild(card);
        });

        // Kontrola STOP
        stopBtn.addEventListener('click', () => {
            audioPlayer.pause();
            audioPlayer.src = "";
            if (playingCard) {
                playingCard.classList.remove('playing');
                playingCard = null;
            }
        });

        // Płynna regulacja głośności
        volumeSlider.addEventListener('input', (e) => {
            audioPlayer.volume = e.target.value;
        });

        // Otwieranie / Zamykanie aplikacji w GeminiOS
        function toggleApp(id) {
            const win = document.getElementById(id);
            win.classList.toggle('open');
        }

        // Zegar w pasku zadań systemu
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('live-clock').textContent = `${hours}:${minutes}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Rejestracja PWA Service Workera
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(err => console.log(err));
            });
        }
    </script>
</body>
</html>
