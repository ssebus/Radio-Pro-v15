<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Radio Pro v15</title>
    
    <meta name="description" content="Słuchaj ulubionych stacji radiowych online za darmo i bez reklam. Dodawaj stacje do ulubionych w aplikacji Radio Pro v15.">
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📻</text></svg>">

    <style>
        :root { --bg: #050508; --accent: #007aff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); background: radial-gradient(circle at 20% 20%, #1a1a2e 0%, #050508 100%); min-height: 100vh; width: 100vw; display: flex; align-items: flex-start; justify-content: center; color: white; padding: 15px 5px; overflow-y: auto; }
        .window { width: 100%; height: auto; max-width: 500px; background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; display: flex; flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .player { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; padding: 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        #viz { width: 100%; height: 50px; }
        .icon-box { width: 90px; height: 90px; background: rgba(255,255,255,0.03); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 45px; margin: 10px 0; border: 1px solid rgba(255,255,255,0.1); }
        .play-btn { width: 65px; height: 65px; background: white; color: black; border-radius: 50%; border: none; font-size: 22px; cursor: pointer; margin-bottom: 10px; }
        .sidebar { flex: 1; background: rgba(0,0,0,0.2); display: flex; flex-direction: column; padding: 15px; }
        .search-area { background: rgba(255,255,255,0.08); border-radius: 10px; padding: 8px; display: flex; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.1); }
        .search-area input { background: none; border: none; color: white; flex: 1; outline: none; font-size: 14px; }
        .list-container { flex: 1; }
        .section-title { font-size: 10px; color: var(--accent); font-weight: 800; margin: 12px 0 6px 0; text-transform: uppercase; letter-spacing: 1px; }
        .item { padding: 10px; background: rgba(255,255,255,0.12); margin-bottom: 5px; border-radius: 10px; display: flex; align-items: center; gap: 10px; font-size: 14px; }
        .star { margin-left: auto; color: rgba(255,255,255,0.15); font-size: 24px; padding: 5px; }
        .star.active { color: #ffcc00; transform: scale(1.1); }
        input[type="range"] { width: 130px; accent-color: var(--accent); margin-top: 5px; }
    </style>
</head>
<body>
    <div class="window">
        <div class="player">
            <canvas id="viz"></canvas>
            <div class="icon-box">📻</div>
            <h2 id="curName" style="font-size: 1.2rem; margin-bottom: 5px; text-align: center;">Ready to play</h2>
            <button class="play-btn" id="pBtn" onclick="togglePlay()">▶</button>
            <input type="range" id="volSlider" min="0" max="1" step="0.01" value="0.8">
        </div>
        <div class="sidebar">
            <div class="search-area">
                <input type="text" id="sIn" placeholder="Search..." onkeypress="if(event.key==='Enter') search()">
                <button onclick="search()" style="background:none; border:none; color:var(--accent); font-weight:bold; cursor:pointer; padding: 0 5px;">OK</button>
            </div>
            <div class="list-container">
                <div class="section-title">MY FAVORITES ★</div>
                <div id="favList"></div>
                <div class="section-title">RESULTS</div>
                <div id="resList"></div>
            </div>
        </div>
    </div>
    
    <audio id="audio" crossorigin="anonymous"></audio>

    <script>
        const audio = document.getElementById('audio');
        const pBtn = document.getElementById('pBtn');
        const canvas = document.getElementById('viz');
        const ctx = canvas.getContext('2d');
        const volSlider = document.getElementById('volSlider');
        let favs = JSON.parse(localStorage.getItem('RADIO_STATIONS_FINAL')) || [];
        let audioCtx, analyser, source, gainNode, dataArray;

        // Ustawienie głośności początkowej prosto w elemencie audio (kluczowe dla Androida i Windowsa)
        audio.volume = volSlider.value;

        function updateMediaSession(name) {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: name,
                    artist: "Radio Pro v15",
                    album: "Playing...",
                    artwork: [
                        { src: 'https://cdn-icons-png.flaticon.com/512/651/651717.png', sizes: '512x512', type: 'image/png' }
                    ]
                });
            }
        }

        function setupAudio() {
            if (audioCtx) return;
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                gainNode = audioCtx.createGain();
                
                source = audioCtx.createMediaElementSource(audio);
                
                source.connect(analyser);
                analyser.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                gainNode.gain.setValueAtTime(volSlider.value, audioCtx.currentTime);
                
                analyser.fftSize = 64;
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                draw();
            } catch(e) {
                console.log("Web Audio API zablokowane przez CORS lub brak wsparcia. Działa fallback.");
            }
        }

        function draw() {
            requestAnimationFrame(draw);
            if(!analyser) return;
            analyser.getByteFrequencyData(dataArray);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath(); ctx.strokeStyle = '#007aff'; ctx.lineWidth = 3;
            let sliceWidth = canvas.width / dataArray.length;
            let x = 0;
            for(let i=0; i<dataArray.length; i++) {
                let v = dataArray[i] / 128.0;
                let y = v * canvas.height / 2;
                if(i===0) ctx.moveTo(x, canvas.height/2 - y);
                else ctx.lineTo(x, canvas.height/2 - y);
                x += sliceWidth;
            }
            ctx.stroke();
        }

        async function search() {
            const q = document.getElementById('sIn').value || 'RMF';
            try {
                const res = await fetch(`https://de1.api.radio-browser.info/json/stations/byname/${encodeURIComponent(q)}`);
                const data = await res.json();
                renderList(data.slice(0, 20), document.getElementById('resList'));
            } catch(e) {}
        }

        function renderList(data, container) {
            container.innerHTML = '';
            data.forEach(s => {
                const isF = favs.some(f => f.stationuuid === s.stationuuid);
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `<span>📻</span><div style="flex:1; overflow:hidden"><b>${s.name}</b></div><div class="star ${isF?'active':''}" onclick="event.stopPropagation(); toggleFav(${JSON.stringify(s).replace(/"/g, '&quot;')})">★</div>`;
                div.onclick = () => play(s);
                container.appendChild(div);
            });
        }

        function play(s) {
            setupAudio();
            if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            
            // Wymuszenie aktualnej głośności przed uruchomieniem nowego streamu
            audio.volume = volSlider.value;
            if(gainNode && audioCtx) {
                gainNode.gain.setValueAtTime(volSlider.value, audioCtx.currentTime);
            }

            audio.src = s.url;
            pBtn.innerText = '⏸';

            audio.play().then(() => {
                updateMediaSession(s.name);
            }).catch(() => { 
                // Gdy stacja blokuje CORS – odpinamy nagłówek i odpalamy "czysty" odtwarzacz.
                // Dzięki temu muzyka gra, a głośność działa tradycyjną metodą (audio.volume).
                audio.removeAttribute('crossorigin'); 
                audio.load(); 
                audio.volume = volSlider.value;
                audio.play().then(() => {
                    pBtn.innerText = '⏸';
                    updateMediaSession(s.name);
                }).catch(err => console.log("Błąd odtwarzania:", err)); 
            });
            document.getElementById('curName').innerText = s.name;
        }

        function togglePlay() {
            setupAudio();
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            
            if (audio.paused) { 
                audio.play(); 
                pBtn.innerText = '⏸'; 
                updateMediaSession(document.getElementById('curName').innerText);
            } else { 
                audio.pause(); 
                pBtn.innerText = '▶'; 
            }
        }

        function toggleFav(s) {
            const idx = favs.findIndex(f => f.stationuuid === s.stationuuid);
            if (idx === -1) favs.push(s);
            else favs.splice(idx, 1);
            localStorage.setItem('RADIO_STATIONS_FINAL', JSON.stringify(favs));
            renderFavs();
            search();
        }

        // PEWNA I SPRAWDZONA KONTROLA GŁOŚNOŚCI DLA WSZYSTKICH SYSTEMÓW
        volSlider.addEventListener('input', (e) => {
            const val = e.target.value;
            audio.volume = val; // Działa na Windows, Mac, Android, iPad, iPhone
            
            // Dodatkowo, jeśli działa Web Audio API (wykres), aktualizujemy gainNode
            if (gainNode && audioCtx && audioCtx.state !== 'suspended') {
                try {
                    gainNode.gain.setValueAtTime(val, audioCtx.currentTime);
                } catch(err) {}
            }
        });

        function renderFavs() { renderList(favs, document.getElementById('favList')); }
        window.onload = () => { renderFavs(); search(); canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; };
    </script>
</body>
</html>
